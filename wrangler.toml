name = "my-errand-app-api"
type = "service"
account_id = "YOUR_ACCOUNT_ID"
main = "worker-entry.js"

[env.production]
vars = { ENVIRONMENT = "production" }

# Environment variables (add via Cloudflare Dashboard)
# DATABASE_URL, JWT_SECRET, STRIPE_SECRET_KEY, etc.

# Route configuration (optional - for custom domain routing)
# [[routes]]
# pattern = "api.myapp.com/*"
# zone_name = "myapp.com"

# Compatibility settings for Node.js support
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm install"

# Optional: schedule health checks
# triggers = { crons = ["0 */6 * * *"] }
